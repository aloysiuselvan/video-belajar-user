<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Video Belajar</title>
    <script src="assets/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3ECF4C',
                        secondary: '#FFC107',
                        surface: '#FFFDF3',
                        muted: '#E5F9E6',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-surface text-slate-900 font-sans">
    <nav class="bg-white border-b border-gray-100 py-4 px-6 md:px-12 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto">
            <a href="index.html">
                <img src="assets/logo.png" alt="Video Belajar Logo" class="h-9 w-auto">
            </a>
        </div>
    </nav>
    <div class="flex justify-center items-start pt-10 pb-12 px-4">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 w-full max-w-md">
            <div class="text-center mb-8">
                <a href="index.html">

                </a>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Pendaftaran Akun</h2>
                <p class="text-slate-500 text-sm">Yuk, daftarkan akunmu sekarang juga!</p>
            </div>

            <form class="space-y-5">
                <!-- Name Input -->
                <div class="w-full">
                    <label class="block text-slate-900 font-medium mb-1.5 text-sm">Nama Lengkap <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="text" placeholder="Nama Lengkap Anda" required
                            class="w-full py-2.5 px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 text-slate-900 placeholder-slate-400" />
                    </div>
                </div>

                <!-- Email Input -->
                <div class="w-full">
                    <label class="block text-slate-900 font-medium mb-1.5 text-sm">E-Mail <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="email" placeholder="nama@email.com" required
                            class="w-full py-2.5 px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 text-slate-900 placeholder-slate-400" />
                    </div>
                </div>

                <!-- Phone Input -->
                <div class="w-full">
                    <label class="block text-slate-900 font-medium mb-1.5 text-sm">No. Hp <span
                            class="text-red-500">*</span></label>
                    <div class="flex items-center gap-3">
                        <!-- Dropdown Container -->
                        <div class="relative">
                            <button type="button" id="country-dropdown-btn"
                                class="flex items-center gap-2 px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <img id="selected-flag" src="assets/flags/id.png" alt="ID"
                                    class="w-6 h-4 object-cover rounded shadow-sm">
                                <span id="selected-code" class="text-slate-900 font-medium text-sm">+62</span>
                                <i data-lucide="chevron-down" class="w-4 h-4 text-slate-500"></i>
                            </button>

                            <!-- Dropdown Menu -->
                            <div id="country-dropdown-menu"
                                class="hidden absolute top-full left-0 mt-1 w-64 bg-white border border-gray-100 shadow-xl rounded-xl overflow-hidden py-1 z-30">
                                <button type="button"
                                    class="w-full px-4 py-3 flex items-center gap-3 hover:bg-gray-50 transition-colors text-left group border-b border-gray-50 last:border-0"
                                    onclick="selectCountry('assets/flags/id.png', '+62')">
                                    <img src="assets/flags/id.png" alt="ID"
                                        class="w-6 h-4 object-cover rounded shadow-sm">
                                    <span class="text-slate-900 font-medium text-sm">+62</span>
                                    <span class="text-slate-500 text-xs ml-auto">Indonesia</span>
                                </button>
                                <button type="button"
                                    class="w-full px-4 py-3 flex items-center gap-3 hover:bg-gray-50 transition-colors text-left group border-b border-gray-50 last:border-0"
                                    onclick="selectCountry('assets/flags/us.png', '+1')">
                                    <img src="assets/flags/us.png" alt="US"
                                        class="w-6 h-4 object-cover rounded shadow-sm">
                                    <span class="text-slate-900 font-medium text-sm">+1</span>
                                    <span class="text-slate-500 text-xs ml-auto">United States</span>
                                </button>
                                <button type="button"
                                    class="w-full px-4 py-3 flex items-center gap-3 hover:bg-gray-50 transition-colors text-left group border-b border-gray-50 last:border-0"
                                    onclick="selectCountry('assets/flags/gb.png', '+44')">
                                    <img src="assets/flags/gb.png" alt="GB"
                                        class="w-6 h-4 object-cover rounded shadow-sm">
                                    <span class="text-slate-900 font-medium text-sm">+44</span>
                                    <span class="text-slate-500 text-xs ml-auto">United Kingdom</span>
                                </button>
                                <button type="button"
                                    class="w-full px-4 py-3 flex items-center gap-3 hover:bg-gray-50 transition-colors text-left group border-b border-gray-50 last:border-0"
                                    onclick="selectCountry('assets/flags/my.png', '+60')">
                                    <img src="assets/flags/my.png" alt="MY"
                                        class="w-6 h-4 object-cover rounded shadow-sm">
                                    <span class="text-slate-900 font-medium text-sm">+60</span>
                                    <span class="text-slate-500 text-xs ml-auto">Malaysia</span>
                                </button>
                                <button type="button"
                                    class="w-full px-4 py-3 flex items-center gap-3 hover:bg-gray-50 transition-colors text-left group"
                                    onclick="selectCountry('assets/flags/sg.png', '+65')">
                                    <img src="assets/flags/sg.png" alt="SG"
                                        class="w-6 h-4 object-cover rounded shadow-sm">
                                    <span class="text-slate-900 font-medium text-sm">+65</span>
                                    <span class="text-slate-500 text-xs ml-auto">Singapore</span>
                                </button>
                            </div>
                        </div>

                        <!-- Input Field -->
                        <div class="relative w-full">
                            <input type="tel" placeholder="812-3456-7890" required
                                class="w-full py-2.5 px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 text-slate-900 placeholder-slate-400" />
                        </div>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="w-full">
                    <label class="block text-slate-900 font-medium mb-1.5 text-sm">Kata Sandi <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="password" id="password-input" placeholder="Min. 8 karakter" required
                            class="w-full py-2.5 px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 text-slate-900 placeholder-slate-400" />
                        <button type="button" id="toggle-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <i data-lucide="eye-off" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password Input -->
                <div class="w-full">
                    <label class="block text-slate-900 font-medium mb-1.5 text-sm">Konfirmasi Kata Sandi <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="password" id="confirm-password-input" placeholder="Ulangi kata sandi" required
                            class="w-full py-2.5 px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 text-slate-900 placeholder-slate-400" />
                        <button type="button" id="toggle-confirm-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <i data-lucide="eye-off" id="confirm-eye-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-3 pt-2">
                    <button type="submit"
                        class="w-full px-6 py-2.5 rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2 bg-primary text-white hover:bg-green-600 shadow-md hover:shadow-lg">Daftar</button>
                    <a href="login.html" class="block w-full">
                        <button type="button"
                            class="w-full px-6 py-2.5 rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2 bg-muted text-primary hover:bg-green-100">Masuk</button>
                    </a>
                </div>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-slate-500">atau</span>
                    </div>
                </div>

                <button type="button"
                    class="w-full px-6 py-2.5 rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2 border border-gray-200 text-slate-700 hover:bg-gray-50 bg-white">
                    <img src="assets/google.svg" alt="Google" class="w-5 h-5 mr-2" />
                    Daftar dengan Google
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Helper function for password toggle
        function setupPasswordToggle(buttonId, inputId, iconId) {
            const toggleButton = document.getElementById(buttonId);
            const passwordInput = document.getElementById(inputId);
            // Removed static eyeIcon reference

            toggleButton.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                // Re-render icon
                const currentIcon = toggleButton.querySelector('[data-lucide]');
                if (currentIcon) {
                    if (type === 'text') {
                        currentIcon.setAttribute('data-lucide', 'eye');
                    } else {
                        currentIcon.setAttribute('data-lucide', 'eye-off');
                    }
                    lucide.createIcons();
                }
            });
        }

        setupPasswordToggle('toggle-password', 'password-input', 'eye-icon');
        setupPasswordToggle('toggle-confirm-password', 'confirm-password-input', 'confirm-eye-icon');

        // Country Dropdown Logic
        const dropdownBtn = document.getElementById('country-dropdown-btn');
        const dropdownMenu = document.getElementById('country-dropdown-menu');
        const selectedFlag = document.getElementById('selected-flag');
        const selectedCode = document.getElementById('selected-code');

        if (dropdownBtn) {
            dropdownBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropdownMenu.classList.toggle('hidden');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!dropdownBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                    dropdownMenu.classList.add('hidden');
                }
            });
        }

        // Select country function
        window.selectCountry = (flagSrc, code) => {
            if (selectedFlag) selectedFlag.src = flagSrc;
            if (selectedCode) selectedCode.innerText = code;
            if (dropdownMenu) dropdownMenu.classList.add('hidden');
        };
    </script>
</body>

</html>
