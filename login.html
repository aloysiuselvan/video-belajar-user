<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Video Belajar</title>
    <script src="assets/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3ECF4C',
                        secondary: '#FFC107',
                        surface: '#FFFDF3',
                        muted: '#E5F9E6',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-surface text-slate-900 font-sans">
    <nav class="bg-white border-b border-gray-100 py-4 px-6 md:px-12 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto">
            <a href="index.html">
                <img src="assets/logo.png" alt="Video Belajar Logo" class="h-9 w-auto">
            </a>
        </div>
    </nav>
    <div class="min-h-screen flex items-center justify-center p-4 -mt-20">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 w-full max-w-md">
            <div class="text-center mb-8">
                <a href="index.html">

                </a>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Masuk ke Akun</h2>
                <p class="text-slate-500 text-sm">Yuk, lanjutin belajarmu di videobelajar.</p>
            </div>

            <form class="space-y-5">
                <!-- Email Input -->
                <div class="w-full">
                    <label class="block text-slate-900 font-medium mb-1.5 text-sm">E-Mail <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="email" placeholder="masukkan emailmu" required
                            class="w-full py-2.5 px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 text-slate-900 placeholder-slate-400" />
                    </div>
                </div>

                <!-- Password Input -->
                <div class="w-full">
                    <label class="block text-slate-900 font-medium mb-1.5 text-sm">Kata Sandi <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="password" id="password-input" placeholder="masukkan kata sandi" required
                            class="w-full py-2.5 px-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 text-slate-900 placeholder-slate-400" />
                        <button type="button" id="toggle-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <i data-lucide="eye-off" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex justify-end">
                    <a href="#" class="text-sm font-medium text-slate-600 hover:text-slate-900">Lupa Password?</a>
                </div>

                <div class="space-y-3">
                    <button type="submit"
                        class="w-full px-6 py-2.5 rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2 bg-primary text-white hover:bg-green-600 shadow-md hover:shadow-lg">Masuk</button>
                    <a href="register.html" class="block w-full">
                        <button type="button"
                            class="w-full px-6 py-2.5 rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2 bg-muted text-primary hover:bg-green-100">Daftar</button>
                    </a>
                </div>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-slate-500">atau</span>
                    </div>
                </div>

                <button type="button"
                    class="w-full px-6 py-2.5 rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2 border border-gray-200 text-slate-700 hover:bg-gray-50 bg-white">
                    <img src="assets/google.svg" alt="Google" class="w-5 h-5 mr-2" />
                    Masuk dengan Google
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Toggle Password Logic
        const toggleButton = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password-input');
        // Removed static eyeIcon reference to avoid stale element bug

        toggleButton.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Re-render icon
            // Use querySelector to get the CURRENT icon element inside the button
            const currentIcon = toggleButton.querySelector('[data-lucide]');
            if (currentIcon) {
                if (type === 'text') {
                    // If visible, show open eye
                    currentIcon.setAttribute('data-lucide', 'eye');
                } else {
                    // If hidden, show closed eye (default)
                    currentIcon.setAttribute('data-lucide', 'eye-off');
                }
                lucide.createIcons();
            }
        });
    </script>
</body>

</html>
